# Render Blueprint — deploys NestJS API + Python AI service
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: procura-api
    env: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate --schema=../packages/database/prisma/schema.prisma && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        value: postgresql://postgres:Chitra%401009@db.aldxtesbexbrqlbpnqpq.supabase.co:5432/postgres
      - key: CLERK_SECRET_KEY
        value: sk_test_Goa4rk4v8k7s3PzdkvU2RpjkzTNOREBufZwUhrBxj0
      - key: CLERK_PUBLISHABLE_KEY
        value: pk_test_bmljZS1naG9zdC00My5jbGVyay5hY2NvdW50cy5kZXYk
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: BYOK_ENCRYPTION_KEY
        value: procura-dev-master-key-2026-32-bytes-hex
      - key: INTERNAL_API_TOKEN
        value: procura-internal-token-dev-2026
      - key: FRONTEND_URL
        value: https://procura-ai.pages.dev
      - key: CLERK_ISSUER
        value: https://nice-ghost-43.clerk.accounts.dev

  - type: web
    name: procura-ai-service
    env: python
    region: oregon
    plan: free
    rootDir: apps/ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://procura-ai.pages.dev
      - key: API_KEY
        sync: false
      - key: INTERNAL_API_TOKEN
        value: procura-internal-token-dev-2026
      - key: DATABASE_URL
        value: postgresql://postgres:Chitra%401009@db.aldxtesbexbrqlbpnqpq.supabase.co:5432/postgres
      - key: OPENAI_API_KEY
        sync: false
